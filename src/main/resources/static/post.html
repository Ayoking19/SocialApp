<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Post - SocialApp</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <!-- The Flash Message for Login -->
    <div class="welcome-message" id="welcomeMsg">
        Welcome to our social media website! 
        <button onclick="dismissWelcome()">Acknowledge</button>
    </div>
    <!-- 1. The Head: Access to the Icon Library -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<!-- THE HIDDEN MENU (Must exist for the button to work!) -->
<div class="overlay-menu" id="fullMenu">
    <div style="display: flex; justify-content: flex-end;">
        <span class="material-icons" style="color:#ff3366; cursor:pointer; font-size:40px;" onclick="toggleOverlayMenu()">close</span>
    </div>
    <ul class="overlay-links" style="list-style:none; padding:0; margin-top:50px;">
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="search.html">Search</a></li>
        <li><a href="following.html">Following</a></li>        
        <li><a href="notifications.html">Notifications</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="#" class="logout" onclick="openLogoutModal()">Log Out</a></li>
    </ul>
</div>

<header class="top-bar">
    <div class="menu-trigger" onclick="toggleOverlayMenu()">
        <span class="material-icons">menu</span>
        <span>Menu</span>
    </div>
    <div class="logo">Social<span>App</span></div>
    <div style="width: 50px;"></div> <!-- Placeholder for balance -->
</header>
<!-- 2. The Top Bar -->
<header class="top-bar">
    <div class="menu-trigger" onclick="toggleOverlayMenu()">
        <span class="material-icons">menu</span>
        <span>Menu</span>
    </div>
    
    <div class="logo">Social<span>App</span></div>
    
    <!-- Empty div for grid symmetry -->
    <div></div>
</header>

<!-- 3. The Bottom Nav -->
<nav class="bottom-nav">
    <a href="index.html">
        <span class="material-icons">home</span>
    </a>
    <a href="search.html">
        <span class="material-icons">search</span>
    </a>
    <a href="notifications.html" id="nav-bell">
        <span class="material-icons">notifications</span>
        <!-- Badge will be injected here by shared.js -->
    </a>
    <a href="profile.html"><span class="material-icons">person</span></a>
</nav>

    <div class="container">
        
        <!-- Main Feed Area -->
        <main class="feed">
            <div class="feed-header">
                <h2 style="cursor: pointer;" onclick="window.history.back()">← Back</h2>
            </div>
            
            <div id="singlePostContainer" style="border-bottom: 1px solid #334155; padding-bottom: 10px;">
                <!-- JavaScript will inject the specific post here -->
            </div>
        </main>
    </div>

    <!-- The Log Out Modal Overlay -->
    <div class="modal-overlay" id="logoutModal" style="display: none;">
        <div class="modal-card">
            <div class="modal-icon">⚠️</div>
            <h3>Leaving so soon?</h3>
            <p>Are you absolutely sure you want to log out of your account?</p>
            <div class="modal-buttons">
                <button class="modal-cancel-btn" onclick="closeLogoutModal()">Cancel</button>
                <button class="modal-confirm-btn" onclick="executeLogout()">Yes, Log Out</button>
            </div>
        </div>
    </div>

    <!-- Link the Shared library -->
    <script src="shared.js"></script>

    <script>
        /* 1. INITIAL SECURITY CHECK */
        checkSecurity(); // Uses the shared check from shared.js

        /* --- WELCOME MESSAGE LOGIC --- */
        if (sessionStorage.getItem("welcomeAcknowledged") === "true") {
            const welcomeMsg = document.getElementById('welcomeMsg');
            if (welcomeMsg) welcomeMsg.style.display = 'none';
        }

        function dismissWelcome() {
            document.getElementById('welcomeMsg').style.display = 'none';
            sessionStorage.setItem("welcomeAcknowledged", "true");
        }

        /* 2. DYNAMIC ROUTING IGNITION */
        const urlParams = new URLSearchParams(window.location.search);
        const currentPostId = urlParams.get('id');

        window.onload = function() {
            if (!currentPostId) {
                document.getElementById('singlePostContainer').innerHTML = "<p style='color: white; padding: 20px;'>Error: No post selected.</p>";
            } else {
                fetchSinglePost(currentPostId);
            }
        };

        /* 3. THE SINGLE POST RENDERER */
        function fetchSinglePost(postId) {
            fetch('http://localhost:8080/api/getSinglePost', {
                method: 'POST',
                body: JSON.stringify({ postId: postId, currentUser: currentUser })
            })
            .then(response => response.json()) 
            .then(post => {
                if (!post || post.error) {
                    document.getElementById('singlePostContainer').innerHTML = "<p style='color: white; padding: 20px;'>Post not found.</p>";
                    return;
                }

                let followBadgeHTML = "";
                if (post.username !== currentUser) {
                    const btnStyle = post.isFollowing ? 'background: rgba(255, 51, 102, 0.1); color: #ff3366; border-color: rgba(255, 51, 102, 0.3);' : '';
                    const btnText = post.isFollowing ? 'Unfollow' : 'Follow';
                    followBadgeHTML = `<button class="media-control-btn" style="margin-left: auto; padding: 4px 10px; font-size: 12px; ${btnStyle}" onclick="feedFollowUser(this, '${post.username}')">${btnText}</button>`;
                }

                let mediaHTML = "";
                if (post.media && post.media !== "") {
                    if (post.media.toLowerCase().endsWith(".mp4") || post.media.startsWith("data:video")) {
                        mediaHTML = `<video src="${post.media}" controls style="width: 100%; max-height: 400px; border-radius: 10px; margin-top: 10px; background: #000;"></video>`;
                    } else {
                        mediaHTML = `<img src="${post.media}" style="width: 100%; border-radius: 10px; margin-top: 10px; object-fit: cover;" alt="Post media">`;
                    }
                }

                const postHTML = `
                    <div class="post" style="border: none; background: transparent; padding: 0;">
                        <div class="user-info" style="display: flex; align-items: center; width: 100%;">
                            <img src="${post.avatar}" onclick="window.location.href='profile.html?user=${post.username}'" class="mini-profile-pic" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px; cursor: pointer;">
                            <div style="display: flex; flex-direction: column;">
                                <a href="profile.html?user=${post.username}" style="color: white; text-decoration: none;"><strong>${post.username}</strong></a>
                                <span class="time-stamp" style="font-size: 12px; color: gray;">${post.timestamp}</span>
                            </div>
                            ${followBadgeHTML}
                        </div>
                        <div class="post-content" style="font-size: 18px; line-height: 1.5; margin-top: 15px;">
                            <p>${post.content}</p>
                            ${mediaHTML}
                        </div>
                        <div class="post-actions" style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
                            <span onclick="toggleLike(this, ${post.id})" class="action-btn like-btn" style="cursor: pointer; ${post.isLiked ? 'color: #ff3366;' : ''}">
                                ❤️ <span class="like-count">${post.likes}</span> Likes
                            </span>
                        </div>
                        <div class="comments-section" id="comments-${post.id}" style="display: block; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                            <div id="comment-list-${post.id}" style="margin-bottom: 10px; max-height: none;">
                                <p style="color: gray; font-size: 14px; text-align: center;">Loading comments...</p>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="comment-input-${post.id}" placeholder="Write a comment..." style="flex: 1; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(0,230,118,0.3); color: white;">
                                <button onclick="submitComment(${post.id})" class="media-control-btn">Post</button>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('singlePostContainer').innerHTML = postHTML;
                
                // Immediately load comments using shared.js function
                loadComments(postId);
            })
            .catch(error => {
                console.error("Error fetching single post:", error);
                document.getElementById('singlePostContainer').innerHTML = "<p style='color: white; padding: 20px;'>Post not found or deleted.</p>";
            });
        }

        /* [REDUNDANT INTERACTION ENGINES REMOVED - NOW IN SHARED.JS] */
    </script>
</body>
</html>
