<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="logo" style="text-align: center; font-size: 36px; font-weight: 800; color: white; margin-bottom: 20px;">
            Social<span style="color: #00e676;">App</span>
        </div>
        <h2>Login to Your Account</h2>
        
        <div id="alertBox" class="alert-box" style="display: none;"></div>

        <form id="loginForm">
            <input type="text" id="identifier" placeholder="Username or Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        
        <p>You don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script src="shared.js"></script>

    <script>
        const alertBox = document.getElementById('alertBox');

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const idVal = document.getElementById('identifier').value;
            const pass = document.getElementById('password').value;

            fetch(`${API_BASE}/api/login`, {
                method: 'POST',
                body: JSON.stringify({ identifier: idVal, password: pass })
            })
            .then(response => response.text())
            .then(data => {
                if (data === "SUCCESS") {
                    /* THE FIX: Save as 'currentUser' so index.html recognizes you */
                    localStorage.setItem("currentUser", idVal); 
                    window.location.href = "index.html"; 
                } else {
                    alertBox.style.display = 'block';
                    alertBox.className = 'alert-box alert-error';
                    alertBox.textContent = 'ERROR: Incorrect username or password.';
                }
            })
            .catch(error => {
                console.error("Network Error:", error);
            });
        });
    </script>
</body>
</html>
