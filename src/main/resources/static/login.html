<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SocialApp</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container" style="text-align: center; padding: 50px 40px;">
        <div class="logo" style="font-size: 40px; font-weight: 900; color: white; margin-bottom: 10px; letter-spacing: 2px;">
            Social<span style="color: #00e676;">App</span>
        </div>
        <p style="color: #a09eb5; margin-bottom: 40px; font-size: 16px;">Join the conversation.</p>
        
        <div id="alertBox" class="alert-box" style="display: none; margin-bottom: 20px;"></div>

        <div style="display: flex; justify-content: center;">
            <div id="g_id_onload"
                 data-client_id="908638965094-o3vbjieiro3f90mu2g3b231fc9lld41m.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="pill" 
                 data-theme="outline"
                 data-text="continue_with"
                 data-size="large"
                 data-logo_alignment="center">
            </div>
        </div>
        
        <p style="margin-top: 40px; font-size: 12px; color: #6a6680;">
            By continuing, you agree to our Terms of Service and Privacy Policy.
        </p>
    </div>

    <div id="newUsernameModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); z-index: 10000; justify-content: center; align-items: center;">
        <div style="background: rgba(26, 11, 46, 0.95); border: 1px solid #00e676; border-radius: 20px; padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.5);">
            <h3 style="color: white; font-size: 24px; margin-bottom: 10px;">Welcome to SocialApp!</h3>
            <p style="color: #a09eb5; margin-bottom: 20px; line-height: 1.5;">We generated a username for you:<br><strong id="generatedUsernameDisplay" style="color: #00e676; font-size: 20px;"></strong></p>
            
            <div id="customUsernameSection" style="display: none; margin-bottom: 20px;">
                <input type="text" id="customUsernameInput" placeholder="Enter new username" style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #00e676; color: white; outline: none; margin-bottom: 5px; font-size: 16px;">
                <p id="usernameError" style="color: #ff3366; font-size: 13px; display: none; margin: 0; font-weight: bold;">Username is taken or invalid.</p>
            </div>

            <div id="modalActionButtons" style="display: flex; flex-direction: column; gap: 12px;">
                <button onclick="keepUsername()" style="background: #00e676; color: black; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px;">Keep this username</button>
                <button onclick="showCustomUsernameInput()" style="background: transparent; border: 1px solid #6a6680; color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px;">Create custom username</button>
            </div>
            
            <div id="modalSaveButtons" style="display: none; flex-direction: column; gap: 12px;">
                <button onclick="saveCustomUsername()" style="background: #00e676; color: black; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px;">Save Username</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
</body>
</html>
