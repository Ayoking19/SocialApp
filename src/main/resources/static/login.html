<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <h2>Login to Your Account</h2>
        
        <div id="alertBox" class="alert-box" style="display: none;"></div>

        <form id="loginForm">
            <!-- Updated ID and Placeholder -->
            <input type="text" id="identifier" placeholder="Username or Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        
        <!-- Fixed Static Link -->
        <p>You don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script>
        const alertBox = document.getElementById('alertBox');

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            /* This stops the annoying page refresh bug! */
            event.preventDefault();

            const idVal = document.getElementById('identifier').value;
            const pass = document.getElementById('password').value;

            fetch('http://localhost:8080/api/login', {
                method: 'POST',
                body: JSON.stringify({ identifier: idVal, password: pass })
            })
            .then(response => response.text())
            .then(data => {
                if (data === "SUCCESS") {
                    /* [Save to Vault: We safely store the identifier so index.html can use it later] */
                    localStorage.setItem("loggedInUser", idVal); 
                    
                    /* Then we redirect */
                    window.location.href = "index.html"; 
                } else {
                    alertBox.style.display = 'block';
                    alertBox.className = 'alert-box alert-error';
                    alertBox.textContent = 'ERROR: Incorrect username or password.';
                }
            })
            .catch(error => {
                console.error("Network Error:", error);
            });
        });
    </script>
</body>
</html>
