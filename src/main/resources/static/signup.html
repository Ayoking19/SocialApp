<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="logo" style="text-align: center; font-size: 36px; font-weight: 800; color: white; margin-bottom: 20px;">
            Social<span style="color: #00e676;">App</span>
        </div>
        <h2>Create a New Account</h2>
        
        <div id="alertBox" class="alert-box" style="display: none;"></div>

        <form id="signupForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="signupBtn">Sign Up</button>
        </form>
        
        <p>Already have an account? <a href="login.html">Log In</a></p>
    </div>

    <script src="shared.js"></script>

    <script>
        const alertBox = document.getElementById('alertBox');
        let isSubmitting = false;

        document.getElementById('signupForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            if (isSubmitting) return;
            isSubmitting = true;

            const user = document.getElementById('username').value;
            const emailVal = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            const btn = document.getElementById('signupBtn');
            btn.textContent = "Creating Account...";

            fetch(`${API_BASE}/api/register`, {
                method: 'POST',
                body: JSON.stringify({ username: user, email: emailVal, password: pass }) 
            })
            .then(response => response.text())
            .then(data => {
                alertBox.style.display = 'block';
                if (data === "SUCCESS") {
                    alertBox.className = 'alert-box alert-success';
                    alertBox.textContent = 'Account created! Logging you in...';
                    
                    // THE UX UPGRADE: Automatically log them in and redirect!
                    localStorage.setItem("currentUser", user);
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                } else {
                    isSubmitting = false;
                    btn.textContent = "Sign Up";
                    alertBox.className = 'alert-box alert-error';
                    alertBox.textContent = 'ERROR: Username already exists.';
                }
            })
            .catch(error => {
                isSubmitting = false;
                btn.textContent = "Sign Up";
                console.error("Network Error:", error);
            });
        });
    </script>
</body>
</html>
