<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Following - Our Social Network</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <!-- The Flash Message for Login -->
    <div class="welcome-message" id="welcomeMsg">
        Welcome to our social media website! 
        <button onclick="dismissWelcome()">Acknowledge</button>
    </div>
    <!-- 1. The Head: Access to the Icon Library -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<!-- THE HIDDEN MENU (Must exist for the button to work!) -->
<div class="overlay-menu" id="fullMenu">
    <div style="display: flex; justify-content: flex-end;">
        <span class="material-icons" style="color:#ff3366; cursor:pointer; font-size:40px;" onclick="toggleOverlayMenu()">close</span>
    </div>
    <ul class="overlay-links" style="list-style:none; padding:0; margin-top:50px;">
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="search.html">Search</a></li>
        <li><a href="following.html">Following</a></li>        
        <li><a href="notifications.html">Notifications</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="#" class="logout" onclick="openLogoutModal()">Log Out</a></li>
    </ul>
</div>

<header class="top-bar">
    <div class="menu-trigger" onclick="toggleOverlayMenu()">
        <span class="material-icons">menu</span>
        <span>Menu</span>
    </div>
    <div class="logo">Social<span>App</span></div>
    <div style="width: 50px;"></div> <!-- Placeholder for balance -->
</header>
<!-- 2. The Top Bar -->
<header class="top-bar">
    <div class="menu-trigger" onclick="toggleOverlayMenu()">
        <span class="material-icons">menu</span>
        <span>Menu</span>
    </div>
    
    <div class="logo">Social<span>App</span></div>
    
    <!-- Empty div for grid symmetry -->
    <div></div>
</header>

<!-- 3. The Bottom Nav -->
<nav class="bottom-nav">
    <a href="index.html">
        <span class="material-icons">home</span>
    </a>
    <a href="search.html">
        <span class="material-icons">search</span>
    </a>
    <a href="notifications.html" id="nav-bell">
        <span class="material-icons">notifications</span>
        <!-- Badge will be injected here by shared.js -->
    </a>
    <a href="profile.html"><span class="material-icons">person</span></a>
</nav>
    <div class="container">
        

        <!-- Main Feed Area -->
        <main class="feed">
            
            <div class="feed-header">
                <h2>Following</h2>
            </div>
            
            <!-- The Create Post Box -->
            <div class="create-post-box">
                <div class="create-post-top">
                    <!-- Added id and style to fix initials flickering -->
                    <img src="" alt="Profile" id="userPostAvatar" class="mini-profile-pic" style="background: #1e293b;">
                    <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                </div>
                
                <!-- Media Preview Area -->
                <div id="mediaPreview" class="media-preview-container"></div>

                <div class="create-post-bottom">
                    <div class="upload-options">
                        <input type="file" id="imageUpload" accept="image/*" hidden onchange="previewMedia(this, 'image')">
                        <input type="file" id="videoUpload" accept="video/*" hidden onchange="previewMedia(this, 'video')">
                        
                        <label for="imageUpload" class="icon-btn">🖼️</label>
                        <label for="videoUpload" class="icon-btn">🎥</label>
                    </div>
                    <button id="postBtn" class="main-post-btn">Post</button>
                </div>
            </div>
            
            <!-- The empty container where JavaScript will inject REAL posts -->
            <div id="feedContainer"></div>
            
        </main>
    </div>

    <!-- The Log Out Modal Overlay -->
    <div class="modal-overlay" id="logoutModal" style="display: none;">
        <div class="modal-card">
            <div class="modal-icon">⚠️</div>
            <h3>Leaving so soon?</h3>
            <p>Are you absolutely sure you want to log out of your account?</p>
            <div class="modal-buttons">
                <button class="modal-cancel-btn" onclick="closeLogoutModal()">Cancel</button>
                <button class="modal-confirm-btn" onclick="executeLogout()">Yes, Log Out</button>
            </div>
        </div>
    </div>
    
    <!-- Link the shared library -->
    <script src="shared.js"></script>

    <script>
        /* 1. THE BOUNCER: Security Check */
        checkSecurity(); // Uses the shared check from shared.js

        /* 2. IDENTITY: Load User Avatar */
        function loadCurrentUserInfo() {
            const postAvatar = document.getElementById('userPostAvatar');
            // Initials immediately (currentUser is global from shared.js)
            postAvatar.src = `https://ui-avatars.com/api/?name=${currentUser}&background=1e293b&color=00e676&rounded=true`;

            fetch('http://localhost:8080/api/profile', {
                method: 'POST',
                body: JSON.stringify({ username: currentUser })
            })
            .then(res => res.json())
            .then(userData => {
                const realImage = userData.avatar || userData.profile_pic_url;
                if (postAvatar && realImage && realImage.trim() !== "") {
                    postAvatar.src = realImage;
                }
            })
            .catch(err => console.error("Avatar Load Error:", err));
        }

        /* --- WELCOME MESSAGE LOGIC --- */
        if (sessionStorage.getItem("welcomeAcknowledged") === "true") {
            const welcomeMsg = document.getElementById('welcomeMsg');
            if(welcomeMsg) welcomeMsg.style.display = 'none';
        }

        function dismissWelcome() {
            document.getElementById('welcomeMsg').style.display = 'none';
            sessionStorage.setItem("welcomeAcknowledged", "true");
        }

        /* --- MEDIA UPLOAD ENGINE --- */
        let attachedMediaBase64 = ""; 
        let attachedMediaType = "";

        function previewMedia(input, type) {
            const previewContainer = document.getElementById('mediaPreview');
            const file = input.files[0];
            if (file) {
                attachedMediaType = type;
                const reader = new FileReader();
                reader.onloadend = function() {
                    attachedMediaBase64 = reader.result; 
                    if (type === 'image') {
                        previewContainer.innerHTML = `<div class="preview-item"><img src="${attachedMediaBase64}"><button class="remove-media-btn" onclick="removeMedia()">X</button></div>`;
                    } else if (type === 'video') {
                        previewContainer.innerHTML = `<div class="preview-item"><video src="${attachedMediaBase64}" controls style="max-height: 300px; border-radius: 15px; border: 1px solid rgba(0, 230, 118, 0.3);"></video><button class="remove-media-btn" onclick="removeMedia()">X</button></div>`;
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function removeMedia() {
            attachedMediaBase64 = "";
            attachedMediaType = "";
            document.getElementById('mediaPreview').innerHTML = "";
            document.getElementById('imageUpload').value = ""; 
            document.getElementById('videoUpload').value = ""; 
        }

        /* [LOGOUT FUNCTIONS REMOVED - NOW IN SHARED.JS] */

        /* 3. THE PAINTER: Fetch and Draw the Following Feed */
        function loadFeed() {
            const feedContainer = document.getElementById("feedContainer");
            feedContainer.innerHTML = "<p style='text-align: center; color: #00e676;'>Loading following feed...</p>";

            fetch('http://localhost:8080/api/followingFeed', {
                method: 'POST',
                body: JSON.stringify({ currentUser: currentUser })
            })
            .then(response => response.json()) 
            .then(posts => {
                feedContainer.innerHTML = ""; 
                if (posts.length === 0) {
                    feedContainer.innerHTML = "<p style='text-align: center; color: #a09eb5;'>No posts yet from people you follow.</p>";
                    return;
                }

                posts.forEach(post => {
                    let mediaHTML = "";
                    if (post.media && post.media.trim() !== "") {
                        if (post.media.toLowerCase().endsWith(".mp4") || post.media.startsWith("data:video")) {
                            mediaHTML = `<video src="${post.media}" controls onclick="event.stopPropagation();" style="width: 100%; max-height: 400px; border-radius: 15px; margin-top: 15px; border: 1px solid rgba(0, 230, 118, 0.3); background: #000;"></video>`;
                        } else {
                            mediaHTML = `
                                <div style="position: relative; margin-top: 15px;">
                                    <img src="${post.media}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 15px; border: 1px solid rgba(0, 230, 118, 0.3);">
                                    <div style="margin-top: 8px; display: flex; gap: 10px;">
                                        <a href="${post.media}" download="SocialApp_Image.png" onclick="event.stopPropagation();" class="media-control-btn">⬇️ Download</a>
                                        <button onclick="event.stopPropagation(); this.parentElement.previousElementSibling.requestFullscreen()" class="media-control-btn">🔍 Full Screen</button>
                                    </div>
                                </div>`;
                        }
                    }

                    feedContainer.innerHTML += `
                        <div class="post" onclick="window.location.href='post.html?id=${post.id}'" style="cursor: pointer;">
                            <div class="user-info" style="display: flex; align-items: center; width: 100%;">
                                <img src="${post.avatar}" onclick="event.stopPropagation(); window.location.href='profile.html?user=${post.username}'" class="mini-profile-pic" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px;">
                                <div style="display: flex; flex-direction: column;">
                                    <a href="profile.html?user=${post.username}" onclick="event.stopPropagation();"><strong>${post.username}</strong></a>
                                    <span class="time-stamp">${post.timestamp}</span>
                                </div>
                                ${post.username !== currentUser ? 
                                    (post.isFollowing ? 
                                        `<button class="media-control-btn" style="margin-left: auto; background: rgba(255, 51, 102, 0.1); color: #ff3366;" onclick="event.stopPropagation(); feedFollowUser(this, '${post.username}')">Unfollow</button>` : 
                                        `<button class="media-control-btn" style="margin-left: auto;" onclick="event.stopPropagation(); feedFollowUser(this, '${post.username}')">Follow</button>`
                                    ) : ''}
                            </div>
                            <div class="post-content"><p>${post.content}</p>${mediaHTML}</div>
                            <div class="post-stats">
                                <span onclick="event.stopPropagation(); toggleLike(this, ${post.id})" class="like-btn">❤️ <span class="like-count">${post.likes}</span></span>
                                <span class="comment-btn" onclick="event.stopPropagation(); toggleComments(${post.id})">💬 <span class="comment-count">${post.commentCount}</span></span>
                            </div>
                            <div class="comments-section" id="comments-${post.id}" onclick="event.stopPropagation();" style="display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                                <div id="comment-list-${post.id}" style="margin-bottom: 10px; max-height: 200px; overflow-y: auto;"></div>
                                <div style="display: flex; gap: 10px;">
                                    <input type="text" id="comment-input-${post.id}" placeholder="Write a comment..." style="flex: 1; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(0,230,118,0.3); color: white;">
                                    <button onclick="submitComment(${post.id})" class="media-control-btn">Post</button>
                                </div>
                            </div>
                        </div>`;
                });
            })
            .catch(error => {
                feedContainer.innerHTML = "<p style='text-align: center; color: #ff3366;'>Error loading following feed.</p>";
            });
        }

        /* --- POST CREATION ENGINE --- */
        document.getElementById("postBtn").addEventListener("click", function() {
            const postContent = document.getElementById("postContent").value;
            if (postContent.trim() === "" && attachedMediaBase64 === "") {
                alert("Please add some text or media.");
                return;
            }
            fetch('http://localhost:8080/api/createPost', {
                method: 'POST',
                body: JSON.stringify({ username: currentUser, content: postContent, media: attachedMediaBase64 })
            })
            .then(response => response.text())
            .then(data => {
                if (data === "SUCCESS") {
                    document.getElementById("postContent").value = "";
                    removeMedia(); 
                    loadFeed(); 
                }
            });
        });

        /* [SOCIAL FUNCTIONS REMOVED - NOW IN SHARED.JS] */

        function loadComments(postId) {
            const commentList = document.getElementById(`comment-list-${postId}`);
            commentList.innerHTML = "<p style='color: gray; font-size: 14px; text-align: center;'>Loading comments...</p>";

            fetch('http://localhost:8080/api/getComments', {
                method: 'POST',
                body: JSON.stringify({ postId: postId.toString(), currentUser: currentUser })
            })
            .then(response => response.json())
            .then(comments => {
                commentList.innerHTML = comments.length === 0 ? "<p style='text-align:center; color:gray;'>No comments.</p>" : "";
                comments.forEach(comment => {
                    commentList.innerHTML += `
                        <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #00e676;">
                            <div style="display: flex; align-items: center;">
                                <a href="profile.html?user=${comment.username}" style="text-decoration: none;">
                                    <strong style="color: #00e676; font-size: 14px;">${comment.username}</strong> 
                                </a>
                                <span style="font-size: 11px; color: gray; margin-left: auto;">${comment.timestamp}</span>
                            </div>
                            <p style="margin: 5px 0 0 0; font-size: 14px; color: #e0e0e0;">${comment.content}</p>
                            <div style="margin-top: 8px;">
                                <span style="font-size: 11px; color: #a09eb5; cursor: pointer;" onclick="replyToComment(${postId}, '${comment.username}')">↩️ Reply</span>
                            </div>
                        </div>`;
                });
            })
            .catch(error => console.error("Error loading comments:", error));
        }

        function replyToComment(postId, targetUsername) {
            const inputField = document.getElementById(`comment-input-${postId}`);
            inputField.value = `@${targetUsername} `;
            inputField.focus();
        }

        /* ========================================= */
        /* --- IGNITION: Start Engines --- */
        /* ========================================= */
        loadFeed();
        loadCurrentUserInfo();
    </script>
</body>
</html>
